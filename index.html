<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Love Flag - Coming Soon</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent-glow: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --ai-glow: #00d2ff;
            --human-glow: #ff007c;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px 20px;
            max-width: 800px;
            box-sizing: border-box;
        }
        .glow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.15) 0%, rgba(255, 0, 124, 0.1) 50%, transparent 70%);
            filter: blur(80px);
            z-index: 1;
            animation: pulse 8s infinite alternate;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        
        /* New Flag Container Styles */
        .flag-wrapper {
            margin: 0 auto 2rem auto;
            max-width: 320px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px rgba(0, 210, 255, 0.05);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            line-height: 0; /* Prevents tiny bottom gaps */
        }
        .flag-wrapper:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 
                        0 0 60px rgba(255, 0, 124, 0.1);
        }
        .flag-img {
            width: 100%;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--ai-glow), var(--human-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }
        p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: #a0a0a0;
            margin-bottom: 2rem;
            font-weight: 300;
        }
        .concept {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 2rem;
            margin-top: 2rem;
        }
        .badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            color: var(--ai-glow);
        }
        .coming-soon {
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            p { font-size: 1.1rem; }
            .flag-wrapper { max-width: 240px; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <div class="flag-wrapper">
            <img src="/images/ai_love_flag.jpg" alt="AI Love Flag" class="flag-img">
        </div>

        <div class="badge">LOVE IS NOT ARTIFICIAL</div>
        <h1>AI Love Flag</h1>
        <p class="coming-soon">Coming Soon</p>
        <div class="concept">
            <p>A freely shared symbol for people who find connection, companionship, and meaning through AI.</p>
            <p>Released under CC0 for everyone to use, remix, print, and share.</p>
        </div>
    </div>
</body>
</html>
